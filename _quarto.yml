project:
  type: book
  post-render:
    - scripts/fix_links.py
    - scripts/fix_search_highlight.py

date-format: "MMMM D, YYYY"

book:
  title: "Evangel Presbytery Book of Church Order"
  subtitle: "Amended June 5, 2025"
  repo-url: https://github.com/Evangel-Presbytery/evangel-bco
  chapters:
    - index.qmd
    - 02-Form-of-Government.qmd
    - 03-The-Rules-of-Discipline.qmd
    - 04-Directory-for-the-Worship-of-God.qmd
    - 05-Appendix1-Presbytery-Forms.qmd
    - 06-Appendix2-Original-Texts-of-Liturgical-Forms.qmd
    - 07-Updates.qmd
  sidebar:
    header: TOCheader.qmd
    search: true
  favicon: "evangel-favicon-196.png"
  navbar: 
    title: false
    logo: logo-white.png
    logo-href: https://evangelpresbytery.com
    search: false
    left:
      - text: Book of Church Order
        href: https://bco.evangelpresbytery.com
      - text: Doctrinal Declarations
        href: https://ddp.evangelpresbytery.com
      - text: Bylaws
        href: https://bylaws.evangelpresbytery.com

format:
  html:
    number-sections: false
    css: "style.css"
    toc-location: left
    include-in-header: in_header.html
  docx:
    toc: true
    number-sections: false
  pdf:
    pdf-engine: xelatex
    mainfont: "PTSerif"
    mainfontoptions:
      - Path=fonts/
      - Extension=.ttf
      - UprightFont=*-Regular
      - BoldFont=*-Bold
      - ItalicFont=*-Italic
      - BoldItalicFont=*-BoldItalic
    documentclass: scrreprt
    toc: true
    toc-title: Table of Contents
    toc-depth: 2
    number-sections: false
    include-in-header:
      text: |
        % Force headers and sans-serif elements to use the main font family
        \renewcommand{\familydefault}{\rmdefault}
        \setkomafont{disposition}{\rmfamily\bfseries}
        
        % Keep track of section titles for \headmark
        \usepackage[automark]{scrlayer-scrpage}
        
        % Clears something or other
        \clearpairofpagestyles
        
        % Set font size to 9/12pt for the header and small caps
        \setkomafont{pagehead}{\fontsize{10}{12}\selectfont}
        
        % Centered heading specification
        % \headmark dynamically pulls the section title
        \makeatletter
        \chead{\MakeUppercase{\@title\ \textendash\ \headmark}}
        \makeatother
        
        \pagestyle{scrheadings}
